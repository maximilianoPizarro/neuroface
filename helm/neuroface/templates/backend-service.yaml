apiVersion: v1
kind: Service
metadata:
  name: {{ include "neuroface.fullname" . }}-backend
  labels:
    {{- include "neuroface.backendLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "neuroface.fullname" . }}-backend
