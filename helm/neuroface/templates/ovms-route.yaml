{{- if and .Values.ovms.enabled .Values.ovms.route.enabled (not .Values.ovms.externalUrl) }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "neuroface.fullname" . }}-ovms
  labels:
    {{- include "neuroface.ovmsLabels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ include "neuroface.fullname" . }}-ovms
    weight: 100
  port:
    targetPort: rest
  {{- if .Values.ovms.route.tls }}
  tls:
    termination: {{ .Values.ovms.route.tls.termination | default "edge" }}
    insecureEdgeTerminationPolicy: Redirect
  {{- end }}
  wildcardPolicy: None
{{- end }}
