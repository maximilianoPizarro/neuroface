apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neuroface.fullname" . }}-frontend
  labels:
    {{- include "neuroface.frontendLabels" . | nindent 4 }}
  annotations:
    {{- include "neuroface.frontendAnnotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "neuroface.fullname" . }}-frontend
  template:
    metadata:
      labels:
        {{- include "neuroface.frontendLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
