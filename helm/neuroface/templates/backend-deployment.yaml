apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neuroface.fullname" . }}-backend
  labels:
    {{- include "neuroface.backendLabels" . | nindent 4 }}
  annotations:
    {{- include "neuroface.backendAnnotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "neuroface.fullname" . }}-backend
  template:
    metadata:
      labels:
        {{- include "neuroface.backendLabels" . | nindent 8 }}
    spec:
      {{- if and .Values.chat.enabled .Values.chat.autoServiceAccount }}
      serviceAccountName: {{ include "neuroface.fullname" . }}-chat
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "neuroface.fullname" . }}-config
          env:
          {{- if and .Values.chat.enabled .Values.chat.autoServiceAccount }}
            - name: NEUROFACE_CHAT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "neuroface.fullname" . }}-chat-token
                  key: token
          {{- end }}
          {{- if and .Values.ppe.enabled .Values.ppe.kafka.enabled }}
            - name: NEUROFACE_PPE_KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ppe.kafka.secretName }}
                  key: password
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if or .Values.persistence.enabled (and .Values.ppe.enabled .Values.ppe.kafka.enabled) }}
          volumeMounts:
          {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
          {{- end }}
          {{- if and .Values.ppe.enabled .Values.ppe.kafka.enabled }}
            - name: kafka-ca-cert
              mountPath: /etc/kafka-certs
              readOnly: true
          {{- end }}
          {{- end }}
      {{- if or .Values.persistence.enabled (and .Values.ppe.enabled .Values.ppe.kafka.enabled) }}
      volumes:
      {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "neuroface.fullname" . }}-data
      {{- end }}
      {{- if and .Values.ppe.enabled .Values.ppe.kafka.enabled }}
        - name: kafka-ca-cert
          secret:
            secretName: {{ .Values.ppe.kafka.caCertSecret }}
      {{- end }}
      {{- end }}
