backend:
  image:
    repository: quay.io/maximilianopizarro/neuroface-backend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  aiModel: lbph
  dlibEnabled: false

frontend:
  image:
    repository: quay.io/maximilianopizarro/neuroface-frontend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

chat:
  enabled: false
  modelEndpoint: ""
  modelName: ""
  apiKey: ""
  maxTokens: 512
  systemPrompt: "You are a facial analysis assistant. Analyze the provided facial detection data and answer questions about expressions, characteristics, and features of the detected faces. Be concise and informative."

route:
  enabled: true
  host: ""
  tls:
    termination: edge

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
