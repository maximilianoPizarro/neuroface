backend:
  image:
    repository: quay.io/maximilianopizarro/neuroface-backend
    tag: v1.2.0
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  aiModel: lbph
  dlibEnabled: false

frontend:
  image:
    repository: quay.io/maximilianopizarro/neuroface-frontend
    tag: v1.2.0
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

chat:
  enabled: true
  modelEndpoint: "https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443"
  modelName: "isvc-granite-31-8b-fp8"
  apiKey: ""
  autoServiceAccount: true
  maxTokens: 512
  systemPrompt: "You are a facial analysis assistant. Analyze the provided facial detection data and answer questions about expressions, characteristics, and features of the detected faces. Be concise and informative."

ovms:
  enabled: true
  externalUrl: ""
  image:
    repository: openvino/model_server
    tag: "2025.2.1"
    pullPolicy: IfNotPresent
  replicas: 1
  restPort: 8000
  grpcPort: 9000
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi
  route:
    enabled: true
    tls:
      termination: edge
  modelName: "face-detection-retail-0005"
  confidenceThreshold: "0.5"
  defaultDetectionMethod: "opencv"
  models: []
  # models:
  #   - name: face-detection
  #     path: /models/face-detection
  #     layout: "NCHW:NHWC"
  modelmesh:
    enabled: false
    adapterImage: "registry.redhat.io/rhoai/odh-openvino-model-server-rhel9@sha256:906d7d4d8d06a09ac5060220dc23c8ac8d7f2fd54445b9b9b42b0dd1af14e488"
    resources:
      requests:
        cpu: 500m
        memory: 3Gi
      limits:
        cpu: "2"
        memory: 3Gi
    storage:
      size: 2Gi
      storageClassName: ""
    downloadJob:
      image: "registry.access.redhat.com/ubi9/python-311:latest"

litellm:
  enabled: false
  image:
    repository: litellm/litellm-non_root
    tag: v1.82.3-stable
    pullPolicy: IfNotPresent
  service:
    port: 4000
  route:
    enabled: true
    tls:
      termination: edge
  masterKey: "sk-neuroface-1234"
  model:
    name: qwen3
    modelId: isvc-qwen3-8b-fp8
    apiBase: "https://isvc-qwen3-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1"
    apiKey: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

route:
  enabled: true
  host: ""
  tls:
    termination: edge

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
