services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: quay.io/maximilianopizarro/neuroface-backend:latest
    container_name: neuroface-backend
    ports:
      - "8080:8080"
    volumes:
      - neuroface-data:/data
    environment:
      NEUROFACE_AI_MODEL: lbph
      NEUROFACE_DATA_DIR: /data
      NEUROFACE_CASCADES_DIR: /opt/app-root/src/app/resources/cascades
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: quay.io/maximilianopizarro/neuroface-frontend:latest
    container_name: neuroface-frontend
    ports:
      - "4200:8080"
    depends_on:
      - backend

volumes:
  neuroface-data:
